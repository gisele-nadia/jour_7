
 <div class="modal-product-view-overlay" (click)="onCloseClick()">
     
</div>

<div class="modal-product-view-container container-fluid row" style="max-width: 400px; margin: auto;">
    <div class="modal-product-view-image row g-3 align-items-center text-center">
        <img [src]="product()?.imageUrl"
         [alt]="product()?.name">
    </div>

    <div class="modal-product-view-details">
        <h2 class="h5 fw-bold mb-1 text-dark">{{ product()?.name}}</h2>
        <p class="text-muted small mb-2">{{product()?.description}}</p>
        <h4 class="text-primary fw-bold">prix solde:  {{product()?.soldPrice}} FCFA</h4>
        <h4 class="text-secondary "> prix normale: {{product()?.regularPrice}} FCFA</h4>
        <p>cree le {{product()?.createAt|date:'dd/MM/yyyy'}}</p>
        <button class="btn btn-primary d-flex flex-column gap-1 align-items-end" (click)="onAddToFavorites()"> Ajouter aus favoris </button>
        <button class="btn btn-dark btn-sm" id="button" (click)="onCloseClick()"> fermer</button>
    </div>
 
</div>
